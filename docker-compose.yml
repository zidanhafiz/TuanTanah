services:
  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - '80:80'
      - '443:443'
    environment:
      # Public domain + ACME contact for Caddy's automatic Let's Encrypt certs.
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      # Persist issued certs + Caddy state across restarts (avoids re-issuing
      # and hitting Let's Encrypt rate limits).
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_SERVICE_KEY}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_data:
  caddy_data:
  caddy_config:
