services:
  web:
    build:
      context: .
      dockerfile: client/Dockerfile
    ports:
      - '80:80'
      - '443:443'
    environment:
      # Public domain + ACME contact for Caddy's automatic Let's Encrypt certs.
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      # Persist issued certs + Caddy state across restarts (avoids re-issuing
      # and hitting Let's Encrypt rate limits).
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: server/Dockerfile
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgres://${POSTGRES_USER:-tuan}:${POSTGRES_PASSWORD:-tuan}@postgres:5432/${POSTGRES_DB:-tuan_tanah}
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      - redis
      - postgres
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-tuan}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-tuan}
      - POSTGRES_DB=${POSTGRES_DB:-tuan_tanah}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  redis_data:
  postgres_data:
  caddy_data:
  caddy_config:
