<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Tuan Tanah — Real-time multiplayer property game</title>
    <meta
      name="description"
      content="Tuan Tanah is a real-time multiplayer Indonesian-themed property game for 2–8 players. Create a room, share the link, and play in your browser."
    />
    <meta name="theme-color" content="#FBBF24" />

    <!-- Open Graph / Facebook / Discord / Slack / LinkedIn link previews.
         %PUBLIC_URL% is replaced at build by VITE_PUBLIC_URL (see vite.config.ts):
         the absolute site origin in prod, or "" (root-relative) in dev. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Tuan Tanah" />
    <meta property="og:title" content="Tuan Tanah — Real-time multiplayer property game" />
    <meta
      property="og:description"
      content="Indonesian-themed online Monopoly for 2–8 players. Create a room, share the link, and play in your browser."
    />
    <meta property="og:url" content="%PUBLIC_URL%/" />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Tuan Tanah logo over neobrutalist property tiles" />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Tuan Tanah — Real-time multiplayer property game" />
    <meta
      name="twitter:description"
      content="Indonesian-themed online Monopoly for 2–8 players. Create a room, share the link, and play in your browser."
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.png" />

    <!-- Fonts are self-hosted via @fontsource (imported in main.tsx) so we keep
         a strict CSP and no external font CDN dependency. -->
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
