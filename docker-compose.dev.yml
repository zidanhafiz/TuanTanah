# Local development helper — runs ONLY Redis in a container.
# Frontend + backend run on the host via `pnpm dev`.
#   docker compose -f docker-compose.dev.yml up -d redis
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  redis_dev_data:
